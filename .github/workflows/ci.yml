name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Supabase connection — set these in GitHub → Settings → Secrets
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # npm ci requires the lock file to include Linux-specific optional
        # packages that aren't resolved on macOS. npm install is used instead
        # and the lock file still pins all direct/transitive versions.
        run: npm install

      # -----------------------------------------------------------------------
      # Lint (Biome)
      # -----------------------------------------------------------------------
      - name: Lint
        run: npm run lint

      # -----------------------------------------------------------------------
      # Type check (TypeScript)
      # -----------------------------------------------------------------------
      - name: Type check
        run: npx tsc --noEmit

      # -----------------------------------------------------------------------
      # Unit tests (Vitest)
      # -----------------------------------------------------------------------
      - name: Unit tests
        run: npm test

      # -----------------------------------------------------------------------
      # Unauthenticated E2E tests (Playwright / Chromium)
      # Authenticated tests are skipped in CI because they require a real
      # Google OAuth session that cannot be automated.
      # -----------------------------------------------------------------------
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (unauthenticated only)
        run: npx playwright test --project=unauthenticated

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # -----------------------------------------------------------------------
      # Production build — only runs if tests pass
      # -----------------------------------------------------------------------
      - name: Build
        run: npm run build
